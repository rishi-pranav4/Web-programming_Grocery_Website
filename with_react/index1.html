<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Pantry</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f6efe6;
            color: #2b2118;
        }

        .topbar {
            background: #c96f4a;
            padding: 20px 28px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border-bottom: 3px solid #b25b38;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .site-title h1 {
            margin: 0;
            font-size: 30px;
            color: #fff8f2;
        }

        .site-title p {
            margin-top: 6px;
            font-size: 13px;
            color: #fff1e8;
        }

        .navbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .navbar a {
            text-decoration: none;
            color: #fff8f2;
            font-weight: bold;
            background: rgba(90, 36, 18, 0.24);
            padding: 10px 14px;
            border-radius: 20px;
            transition: background 0.2s ease;
        }

        .navbar a:hover {
            background: rgba(90, 36, 18, 0.4);
        }

        .container {
            display: grid;
            grid-template-columns: 220px 1fr 280px;
            gap: 16px;
            min-height: calc(100vh - 88px);
            padding: 22px;
        }

        .box {
            background: #fffaf5;
            border-radius: 18px;
            padding: 22px;
            border: 1px solid #eadccd;
            box-shadow: 0 6px 18px rgba(120, 84, 58, 0.08);
        }

        h1, h2 {
            margin-bottom: 16px;
        }

        .menu-title {
            cursor: pointer;
            color: #7b4b34;
        }

        .menu-title:hover {
            text-decoration: underline;
        }

        .menu button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 12px;
            background: #efe1d3;
            text-align: left;
            cursor: pointer;
            color: #533b2c;
            transition: all 0.2s ease;
        }

        .menu button.active {
            background: #7d9b76;
            color: white;
            font-weight: bold;
        }

        .menu button:hover {
            background: #e5d2c0;
        }

        .tools {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            padding: 14px;
            background: #f8efe5;
            border-radius: 14px;
        }

        .tools input,
        .tools select {
            padding: 10px;
            border: 1px solid #d7c3b1;
            border-radius: 10px;
            background: #fffdf9;
            color: #2b2118;
        }

        .tools input {
            flex: 1;
            min-width: 220px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid #e3d2c1;
            border-radius: 16px;
            padding: 18px;
            background: #fff7f0;
            box-shadow: 0 4px 10px rgba(133, 96, 70, 0.06);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 12px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3e1d3;
            border-radius: 14px;
        }

        .card h3 {
            margin-bottom: 8px;
            font-size: 20px;
        }

        .card p {
            margin-bottom: 10px;
            font-size: 14px;
            color: #6f5a49;
        }

        .card button,
        .small-btn,
        .clear-btn {
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .card button {
            background: #c96f4a;
            color: white;
        }

        .quantity-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .quantity-actions button {
            flex: 1;
        }

        .small-btn {
            background: #dfd2c5;
            color: #4e3a2d;
            margin-top: 8px;
        }

        .profile {
            background: #e7efe3;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid #d5e0d0;
        }

        .profile p {
            margin-bottom: 8px;
        }

        .summary {
            margin-bottom: 16px;
        }

        .checkout-layout {
            display: grid;
            gap: 16px;
        }

        .checkout-panel {
            background: #fff7f0;
            border: 1px solid #e3d2c1;
            border-radius: 16px;
            padding: 18px;
        }

        .checkout-panel h3 {
            margin-bottom: 12px;
        }

        .checkout-panel p {
            margin-bottom: 8px;
            color: #6f5a49;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #dfd0c2;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            background: #fffaf5;
        }

        .clear-btn {
            width: 100%;
            background: #7d9b76;
            color: white;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React + ReactDOM (for rendering only) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        // ─────────────────────────────────────────────
        // DATA  (plain JS — no state needed)
        // ─────────────────────────────────────────────
        const items = {
            Fruits: [
                { name: "Apple",       icon: "🍎", price: 1.5, category: "Fruits" },
                { name: "Banana",      icon: "🍌", price: 0.8, category: "Fruits" },
                { name: "Orange",      icon: "🍊", price: 1.1, category: "Fruits" },
                { name: "Mango",       icon: "🥭", price: 2.0, category: "Fruits" },
                { name: "Grape",       icon: "🍇", price: 0.5, category: "Fruits" },
                { name: "Watermelon",  icon: "🍉", price: 0.9, category: "Fruits" },
                { name: "Pineapple",   icon: "🍍", price: 1.7, category: "Fruits" },
                { name: "Green Apple", icon: "🍏", price: 0.7, category: "Fruits" },
                { name: "Pear",        icon: "🍐", price: 1.2, category: "Fruits" },
                { name: "Melon",       icon: "🍈", price: 2.5, category: "Fruits" }
            ],
            Vegetables: [
                { name: "Potato",    icon: "🥔", price: 0.9, category: "Vegetables" },
                { name: "Carrot",    icon: "🥕", price: 0.7, category: "Vegetables" },
                { name: "Onion",     icon: "🧅", price: 0.6, category: "Vegetables" },
                { name: "Cucumber",  icon: "🥒", price: 0.5, category: "Vegetables" },
                { name: "Tomato",    icon: "🍅", price: 0.7, category: "Vegetables" },
                { name: "Peas",      icon: "🫛", price: 0.3, category: "Vegetables" },
                { name: "EggPlant",  icon: "🍆", price: 0.6, category: "Vegetables" },
                { name: "Capsicum",  icon: "🫑", price: 1.2, category: "Vegetables" },
                { name: "Mushroom",  icon: "🍄‍🟫", price: 1.0, category: "Vegetables" }
            ],
            Dairy: [
                { name: "Milk",   icon: "🥛", price: 2.4, category: "Dairy" },
                { name: "Cheese", icon: "🧀", price: 3.5, category: "Dairy" },
                { name: "Butter", icon: "🧈", price: 2.8, category: "Dairy" }
            ],
            "Meat&Eggs": [
                { name: "Chicken", icon: "🍗", price: 2.0, category: "Meat&Eggs" },
                { name: "Egg",     icon: "🥚", price: 5.0, category: "Meat&Eggs" },
                { name: "Mutton",  icon: "🍖", price: 2.5, category: "Meat&Eggs" },
                { name: "Bacon",   icon: "🥓", price: 1.8, category: "Meat&Eggs" },
                { name: "Pork",    icon: "🥩", price: 2.8, category: "Meat&Eggs" }
            ]
        };

        const allItems = Object.values(items).flat();

        const recipes = [
            { name: "Fruit Salad",    needs: ["Apple", "Banana", "Orange"] },
            { name: "Mashed Potato",  needs: ["Potato", "Milk", "Butter"]  },
            { name: "Cheesy Veg Mix", needs: ["Onion", "Carrot", "Cheese"] }
        ];

        // ─────────────────────────────────────────────
        // STATE  (plain JS objects — single source of truth)
        // ─────────────────────────────────────────────
        const state = {
            view:     "shop",   // "shop" | "cart" | "checkout" | "recipes"
            category: "All",
            search:   "",
            sort:     "default",
            cart:     {}        // { itemName: quantity }
        };

        // ─────────────────────────────────────────────
        // STATE MUTATORS  (plain JS functions)
        // ─────────────────────────────────────────────
        function openFullMenu() {
            state.view     = "shop";
            state.category = "All";
            render();
        }

        function openMenu(nextView, nextCategory) {
            state.view = nextView;
            if (nextCategory) state.category = nextCategory;
            render();
        }

        function addItem(name) {
            state.cart[name] = (state.cart[name] || 0) + 1;
            render();
        }

        function removeOne(name) {
            if (!state.cart[name]) return;
            state.cart[name] -= 1;
            if (state.cart[name] <= 0) delete state.cart[name];
            render();
        }

        function removeAll(name) {
            delete state.cart[name];
            render();
        }

        function clearBasket() {
            state.cart = {};
            render();
        }

        function setSearch(value) {
            state.search = value;
            render();
        }

        function setSort(value) {
            state.sort = value;
            render();
        }

        // ─────────────────────────────────────────────
        // DERIVED VALUES  (plain JS functions, read state)
        // ─────────────────────────────────────────────
        function getCartNames()   { return Object.keys(state.cart); }
        function getUniqueCount() { return getCartNames().length; }
        function getTotalCount()  {
            return getCartNames().reduce((total, name) => total + state.cart[name], 0);
        }

        function getShopItems() {
            let list = state.category === "All" ? allItems : items[state.category];
            if (state.search.trim() !== "") {
                list = list.filter(item =>
                    item.name.toLowerCase().includes(state.search.toLowerCase())
                );
            }
            if (state.sort === "az") {
                list = list.slice().sort((a, b) => a.name.localeCompare(b.name));
            }
            return list;
        }

        function getRecipeCards() {
            return recipes.filter(recipe => {
                if (state.search.trim() === "") return true;
                return recipe.name.toLowerCase().includes(state.search.toLowerCase());
            });
        }

        function getPageTitle() {
            if (state.view === "cart")     return "Cart";
            if (state.view === "checkout") return "Checkout";
            if (state.view === "recipes")  return "Recipes";
            if (state.category === "All")  return "Full Menu";
            return state.category;
        }

        // ─────────────────────────────────────────────
        // REACT — rendering only, reads from plain state
        // ─────────────────────────────────────────────
        function renderMainCards() {
            const { view, cart } = state;
            const cartNames = getCartNames();

            if (view === "shop") {
                const list = getShopItems();
                if (list.length === 0) return <p>No items found.</p>;

                return list.map(item => {
                    const quantity = cart[item.name] || 0;
                    return (
                        <div className="card" key={item.category + item.name}>
                            <div className="icon">{item.icon}</div>
                            <h3>{item.name}</h3>
                            <p>Category: {item.category}</p>
                            <p>Price: ${item.price.toFixed(2)}</p>
                            <p>Quantity: {quantity}</p>
                            {quantity === 0 ? (
                                <button onClick={() => addItem(item.name)}>Add to Basket</button>
                            ) : (
                                <div className="quantity-actions">
                                    <button className="small-btn" onClick={() => removeOne(item.name)}>-</button>
                                    <button onClick={() => addItem(item.name)}>+</button>
                                </div>
                            )}
                        </div>
                    );
                });
            }

            if (view === "cart") {
                if (cartNames.length === 0) return <p>Your basket is empty.</p>;
                return cartNames.map(name => (
                    <div className="card" key={name}>
                        <h3>{name}</h3>
                        <p>Quantity: {cart[name]}</p>
                        <button onClick={() => addItem(name)}>Add One</button>
                        <br />
                        <button className="small-btn" onClick={() => removeOne(name)}>Remove One</button>
                    </div>
                ));
            }

            if (view === "checkout") {
                return (
                    <React.Fragment>
                        <div className="checkout-panel">
                            <h3>Order Summary</h3>
                            <p><strong>Unique items:</strong> {getUniqueCount()}</p>
                            <p><strong>Total quantity:</strong> {getTotalCount()}</p>
                        </div>
                        <div className="checkout-panel">
                            <h3>Basket Details</h3>
                            {cartNames.length === 0 ? (
                                <p>Basket is empty.</p>
                            ) : (
                                cartNames.map(name => (
                                    <div className="cart-item" key={name}>
                                        <span>{name} ({cart[name]})</span>
                                        <button className="small-btn" onClick={() => removeAll(name)}>
                                            Remove
                                        </button>
                                    </div>
                                ))
                            )}
                            <button className="clear-btn" onClick={clearBasket}>Clear Basket</button>
                        </div>
                    </React.Fragment>
                );
            }

            // recipes view
            const recipeCards = getRecipeCards();
            if (recipeCards.length === 0) return <p>No recipes found.</p>;
            return recipeCards.map(recipe => (
                <div className="card" key={recipe.name}>
                    <h3>{recipe.name}</h3>
                    <p>Ingredients: {recipe.needs.join(", ")}</p>
                </div>
            ));
        }

        function App() {
            const { view, category, search, sort } = state;

            return (
                <React.Fragment>
                    <div className="topbar">
                        <div className="site-title">
                            <h1>Urban Pantry</h1>
                            <p>Fresh groceries, simple shopping, quick recipe ideas</p>
                        </div>
                    </div>

                    <div className="container">
                        {/* ── LEFT: Menu ── */}
                        <div className="box">
                            <h2 className="menu-title" onClick={openFullMenu}>Menu</h2>
                            <div className="menu">
                                {["Fruits", "Vegetables", "Dairy", "Meat&Eggs"].map(cat => (
                                    <button
                                        key={cat}
                                        className={"menu-btn" + (view === "shop" && category === cat ? " active" : "")}
                                        onClick={() => openMenu("shop", cat)}
                                    >
                                        {cat}
                                    </button>
                                ))}
                                {[["cart","Cart"],["recipes","Recipes"],["checkout","Checkout"]].map(([v, label]) => (
                                    <button
                                        key={v}
                                        className={"menu-btn" + (view === v ? " active" : "")}
                                        onClick={() => openMenu(v)}
                                    >
                                        {label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* ── CENTRE: Content ── */}
                        <div className="box">
                            <h1>{getPageTitle()}</h1>

                            {view !== "checkout" && (
                                <div className="tools">
                                    <input
                                        type="text"
                                        placeholder={view === "recipes" ? "Search recipes" : "Search items"}
                                        value={search}
                                        onChange={e => setSearch(e.target.value)}
                                    />
                                    {view === "shop" && (
                                        <select value={sort} onChange={e => setSort(e.target.value)}>
                                            <option value="default">Default</option>
                                            <option value="az">A to Z</option>
                                        </select>
                                    )}
                                </div>
                            )}

                            <div className={view === "checkout" ? "checkout-layout" : "cards"}>
                                {renderMainCards()}
                            </div>
                        </div>

                        {/* ── RIGHT: Profile ── */}
                        <div className="box">
                            <div className="profile">
                                <h2>User Profile</h2>
                                <p><strong>Name:</strong> User 1</p>
                                <p><strong>Email:</strong> user1@gmail.com</p>
                                <p><strong>Status:</strong> Active</p>
                            </div>
                            <p>Open Checkout to view your basket totals and order details.</p>
                        </div>
                    </div>
                </React.Fragment>
            );
        }

        // ─────────────────────────────────────────────
        // RENDER LOOP  — React is only the view layer
        // ─────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById("root"));

        function render() {
            root.render(<App />);
        }

        render(); // initial paint
    </script>
</body>
</html>
