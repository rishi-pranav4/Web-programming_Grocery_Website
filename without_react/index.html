<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Pantry</title>
<style>
/*CSS Styling*/
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

body { background: #f6efe6; color: #2b2118; }

.topbar {
    background: #c96f4a;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    border-bottom: 3px solid #b25b38;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.site-title h1 { font-size: 30px; color: #fff8f2; }
.site-title p { font-size: 13px; color: #fff1e8; }

.container {
    display: grid;
    grid-template-columns: 220px 1fr 280px;
    gap: 16px;
    padding: 22px;
}

.box {
    background: #fffaf5;
    border-radius: 18px;
    padding: 22px;
    border: 1px solid #eadccd;
    box-shadow: 0 6px 18px rgba(120, 84, 58, 0.08);
}

.menu button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: none;
    border-radius: 12px;
    background: #efe1d3;
    cursor: pointer;
}



.tools {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    padding: 14px;
    background: #f8efe5;
    border-radius: 14px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
}

.card {
    border: 1px solid #e3d2c1;
    border-radius: 16px;
    padding: 18px;
    background: #fff7f0;
}

.icon { font-size: 40px; margin-bottom: 12px; }

.quantity-actions { display: flex; gap: 10px; }

.cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.clear-btn {
    width: 200px;
    height: 50px;
    background: #7d9b76;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 10px;
}
.qty-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 10px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.minus {
    background: #e5d2c0;
    color: #5a3e2b;
}



.plus {
    background: #c96f4a;
    color: white;
}



.add-btn {
    width: 100px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #c96f4a;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.add-btn-basket{
    width: 100px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #c96f4a;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.checkout-summary {
    background: #f8efe5;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

.checkout-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.checkout-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff7f0;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e3d2c1;
}
.remove-btn
{
    width: 50.0%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #c96f4a;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
.search-bar {
    flex: 1;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid #eadccd;
    background: #fffaf5;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}



.search-bar::placeholder {
    color: #a08d7d;
}

.search-btn{
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid #eadccd;
    background: #fffaf5;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}
.login-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 80vh;
    gap: 15px;
}

.login-input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.login-container button {
    padding: 10px 20px;
    background-color: #5aa61f;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.login-container button:hover {
    background-color: #4a8e1a;
}
</style>
</head>

<body>

<div id="root"></div>

<script>
// Grocery ingredients
const items = {
Fruits: [
{ name:"Apple",icon:"🍎",price:1.5,category:"Fruits"},
{ name:"Banana",icon:"🍌",price:0.8,category:"Fruits"},
{ name:"Orange",icon:"🍊",price:1.1,category:"Fruits"},
{ name:"Mango",icon:"🥭",price:2.0,category:"Fruits"},
{ name:"Grape",icon:"🍇",price:0.5,category:"Fruits"},
{ name:"Watermelon",icon:"🍉",price:0.9,category:"Fruits"},
{ name:"Pineapple",icon:"🍍",price:1.7,category:"Fruits"},
{ name:"Green Apple",icon:"🍏",price:0.7,category:"Fruits"},
{ name:"Pear",icon:"🍐",price:1.2,category:"Fruits"},
{ name:"Melon",icon:"🍈",price:2.5,category:"Fruits"}
],
Vegetables: [
{ name:"Potato",icon:"🥔",price:0.9,category:"Vegetables"},
{ name:"Carrot",icon:"🥕",price:0.7,category:"Vegetables"},
{ name:"Onion",icon:"🧅",price:0.6,category:"Vegetables"},
{ name:"Cucumber",icon:"🥒",price:0.5,category:"Vegetables"},
{ name:"Tomato",icon:"🍅",price:0.7,category:"Vegetables"},
{ name:"Peas",icon:"🫛",price:0.3,category:"Vegetables"},
{ name:"EggPlant",icon:"🍆",price:0.6,category:"Vegetables"},
{ name:"Capsicum",icon:"🫑",price:1.2,category:"Vegetables"},
{ name:"Mushroom",icon:"🍄‍🟫",price:1.0,category:"Vegetables"}
],
Dairy: [
{ name:"Milk",icon:"🥛",price:2.4,category:"Dairy"},
{ name:"Cheese",icon:"🧀",price:3.5,category:"Dairy"},
{ name:"Butter",icon:"🧈",price:2.8,category:"Dairy"}
],
"Meat&Eggs": [
{ name:"Chicken",icon:"🍗",price:2.0,category:"Meat&Eggs"},
{ name:"Egg",icon:"🥚",price:5.0,category:"Meat&Eggs"},
{ name:"Mutton",icon:"🍖",price:2.5,category:"Meat&Eggs"},
{ name:"Bacon",icon:"🥓",price:1.8,category:"Meat&Eggs"},
{ name:"Pork",icon:"🥩",price:2.8,category:"Meat&Eggs"}
]
};

const allItems = Object.values(items).flat();
// recipes
const recipes = [
{ name:"Fruit Salad", needs:["Apple","Banana","Orange"] },
{ name:"Mashed Potato", needs:["Potato","Milk","Butter"] },
{name:"Bacon and Eggs",needs:["Bacon","Egg"]},
{name:"Cheese Omlette",needs:["Cheese","Egg","Butter"]},
{name:"Grilled Pork",needs:["Pork","Butter"]},
{name:"Mushroom Omlette",needs:["Mushroom","Butter","Egg"]},
{name:"Vegetable Salad",needs:["Cucumber","Tomato","Onion"]},
{name:"Bacon Egg and Cheese",needs:["Bacon","Egg","Cheese"]}
];

// Initial State of the page
const state = {

view:"login",
category:"All",
search:"",
cart:{}
};

const root = document.getElementById("root");

// Helper function for the check out page 
const cartNames = () => Object.keys(state.cart);
const totalQty = () => cartNames().reduce((t,n)=>t+state.cart[n],0);

// some of the action function like adding a ingredient 
function setView(view,category){ state.view=view; if(category) state.category=category; state.search=""; render(); }
function add(name){ state.cart[name]=(state.cart[name]||0)+1; render(); }
function remove(name){ if(!state.cart[name]) return; state.cart[name]--; if(state.cart[name]<=0) delete state.cart[name]; render(); }
function removeAll(name){ delete state.cart[name]; render(); }
function clearCart(){ state.cart={}; render(); }
function loginUser() {
    let name = document.getElementById("username").value;

    if (name.trim() === "") {
        alert("Please enter your name");
        return;
    }

    state.user = name;
    state.view = "shop";   // go to main app
    render();
}

// Render function to render all the pages since the page contains a lot of pages so we use state
function render(){
let content="";
let list = state.category==="All"?allItems:items[state.category];

    if (state.view === "login") {
    content = `
        <div class="login-container">
            <h2>Welcome to Urban Pantry</h2>
            
            <input 
                class="login-input"
                placeholder="Enter your name"
                id="username"
            >

            <button class="add-btn" onclick="loginUser()">Enter</button>
        </div>
    `;
    root.innerHTML=content;
    return;
    
}

if(state.search)
list=list.filter(i=>i.name.toLowerCase().includes(state.search.toLowerCase()));


if(state.view==="shop"){
content=list.map(i=>{
const q=state.cart[i.name]||0;
return `
<div class="card">
<div class="icon">${i.icon}</div>
<h3>${i.name}</h3>
<p>${i.category}</p>
<p>$${i.price}</p>
<p>Quantity: ${q}</p>
${q===0
? `<button class="add-btn-basket" onclick="add('${i.name}')">Add to Basket</button>`
: `<div class="quantity-actions">
<button class="qty-btn minus" onclick="remove('${i.name}')">-</button>
<button class="qty-btn plus" onclick="add('${i.name}')">+</button>
</div>`
}
</div>`;
}).join("");
}

if(state.view==="cart"){
content = cartNames().map(n=>`
<div class="card">
    <h3>${n}</h3>
    <p>Quantity: ${state.cart[n]}</p>

    <div class="quantity-actions">
        <button class="qty-btn minus" onclick="remove('${n}')">-</button>
        <button class="qty-btn plus" onclick="add('${n}')">+</button>
    </div>
</div>
`).join("");
}

if(state.view==="checkout"){
    content = `
<div class="checkout-summary">
    <h2>Order Summary</h2>
    <p><strong>Items:</strong> ${cartNames().length}</p>
    <p><strong>Total Quantity:</strong> ${totalQty()}</p>
</div>

<div class="checkout-list">
${cartNames().map(n=>`
    <div class="checkout-item">
        <div>
            <strong>${n}</strong><br>
            Qty: ${state.cart[n]}
        </div>
        <button class="remove-btn" onclick="removeAll('${n}')">Remove</button>
    </div>
`).join("")}
</div>

<button class="clear-btn" onclick="clearCart()">Clear Basket</button>
`;
}

if(state.view==="recipes"){
content=recipes.map(r=>`
<div class="card">
<h3>${r.name}</h3>
<p>Ingredients: ${r.needs.join(", ")}</p>
</div>
`).join("");
}

root.innerHTML = `
<div class="topbar">
<div class="site-title">
<h1>Urban Pantry</h1>
<p>Fresh groceries, simple shopping, quick recipe ideas</p>
</div>
</div>

<div class="container">

<div class="box">
<h2>Menu</h2>
<div class="menu">
    <button onclick="setView('shop','All')">All Items</button>
${["Fruits","Vegetables","Dairy","Meat&Eggs"].map(c=>
`<button onclick="setView('shop','${c}')">${c}</button>`
).join("")}
<button onclick="setView('cart')">Cart</button>
<button onclick="setView('recipes')">Recipes</button>
<button onclick="setView('checkout')">Checkout</button>
</div>
</div>

<div class="box">
<div class="tools">
<input 
    class="search-bar"
    placeholder="Search..."
    oninput="state.search=this.value; ">
<button class="search-btn"onclick="render()">Search</button>

</div>
<div class="cards">${content}</div>
</div>

<div class="box">
<h2>User Profile</h2>
<br>
<p> ${state.user|| "Guest"}</p>
</div>

</div>
`;
}
// rendering the whole page 
render();

</script>

</body>
</html>
